<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upwork TrustScore - Run AI</title>
    <style>
      :root { color-scheme: light; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f8fafc; color: #0f172a; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 22px; }
      header { background: linear-gradient(180deg,#f1f5ff,white); border-bottom: 1px solid #e5e7eb; }
      .top { display:flex; align-items:center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
      h1 { margin: 0; font-size: 26px; }
      .muted { color: #64748b; font-size: 13px; }
      .btn { padding: 10px 14px; border-radius: 12px; border: 1px solid #dbeafe; background: white; cursor: pointer; font-weight: 900; color: #1d4ed8; text-decoration: none; display: inline-block; }
      .btn.primary { background: #1d4ed8; border-color:#1d4ed8; color: white; }
      .row { display:flex; gap: 10px; flex-wrap: wrap; align-items:center; }
      .card { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 16px; margin-top: 14px; }
      .log { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; background: #f1f5f9; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; white-space: pre-wrap; }
      .badge { display:inline-block; padding: 4px 10px; border-radius: 999px; border:1px solid; font-size: 12px; font-weight: 900; }
      .ok { color:#059669; border-color:#10b981; background:#ecfdf5; }
      .bad { color:#b91c1c; border-color:#ef4444; background:#fef2f2; }
      code { background:#f1f5f9; padding:2px 6px; border-radius:8px; }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="top">
          <div>
            <h1>Run AI Risk Scoring</h1>
            <div class="muted">Server commits AI hash on-chain.</div>
          </div>
          <div class="row">
            <a class="btn" href="/upwork/submit_proof">Back</a>
            <a class="btn" href="/dashboard">Dashboard</a>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div class="card">
        <div class="row">
          <div class="muted">job_id:</div>
          <div id="jobId" style="font-weight:900;"></div>
        </div>

        <div style="height:12px;"></div>
        <div class="row">
          <button class="btn primary" id="runBtn" type="button">Run AI (commit hash)</button>
          <a class="btn" href="/upwork/decision" id="decisionLink" style="display:none;">Go to Decision</a>
        </div>
        <div style="height:12px;"></div>
        <div class="log" id="log">Ready.</div>
      </div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const jobId = localStorage.getItem("upwork_job_id");
      $("jobId").textContent = jobId ? jobId : "(missing)";
      if (!jobId) $("log").textContent = "Missing job_id. Go to /upwork/create.";

      $("runBtn").addEventListener("click", async () => {
        try {
          $("log").textContent = "Running AI...";
          const res = await fetch("/upwork/job/run_ai", {
            method:"POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({job_id: parseInt(jobId, 10)})
          });
          const out = await res.json();
          if (!res.ok || !out.ok) throw new Error(out.message || "run_ai failed");

          const r = out.ai_result || {};
          const verdict = r.verdict || "-";
          const risk = (r.riskScore === undefined) ? "-" : r.riskScore;
          $("log").textContent =
            "AI verdict: " + verdict + "\\n" +
            "RiskScore: " + risk + "\\n" +
            "AI hash: " + out.ai_hash_hex;

          $("decisionLink").style.display = "inline-block";
          window.location.href = "/upwork/decision";
        } catch (e) {
          $("log").textContent = "Error: " + e;
          console.error(e);
        }
      });
    </script>
  </body>
</html>
