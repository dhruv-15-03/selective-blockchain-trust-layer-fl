<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Upwork TrustScore - Approve or Dispute</title>
    <style>
      :root { color-scheme: light; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f8fafc; color: #0f172a; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 22px; }
      header { background: linear-gradient(180deg,#f1f5ff,white); border-bottom: 1px solid #e5e7eb; }
      .top { display:flex; align-items:center; justify-content: space-between; gap: 14px; flex-wrap: wrap; }
      h1 { margin: 0; font-size: 26px; }
      .muted { color: #64748b; font-size: 13px; }
      .btn { padding: 10px 14px; border-radius: 12px; border: 1px solid #dbeafe; background: white; cursor: pointer; font-weight: 900; color: #1d4ed8; text-decoration: none; display: inline-block; }
      .btn.primary { background: #1d4ed8; border-color:#1d4ed8; color: white; }
      .row { display:flex; gap: 10px; flex-wrap: wrap; align-items:center; }
      .card { background: white; border: 1px solid #e5e7eb; border-radius: 16px; padding: 16px; margin-top: 14px; }
      .log { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; font-size: 12px; background: #f1f5f9; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; white-space: pre-wrap; }
      code { background:#f1f5f9; padding:2px 6px; border-radius:8px; }
      .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
      @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="top">
          <div>
            <h1>Client Decision (Approve / Dispute)</h1>
            <div class="muted">Choose action; server penalizes inconsistent parties and updates TrustScore.</div>
          </div>
          <div class="row">
            <a class="btn" href="/upwork/run_ai">Back</a>
            <a class="btn" href="/dashboard">Dashboard</a>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div class="card">
        <div class="row">
          <div class="muted">job_id:</div>
          <div id="jobId" style="font-weight:900;"></div>
        </div>
        <div style="height:10px;"></div>

        <div class="grid">
          <div>
            <div class="muted" style="font-weight:900; margin-bottom:8px;">Choose client_index</div>
            <select id="clientIndex" style="width:100%; padding:12px; border-radius:12px; border:1px solid #dbeafe;">
              <option value="1" selected>client_index=1 (client_1)</option>
              <option value="2">client_index=2 (client_2)</option>
              <option value="3">client_index=3 (client_3)</option>
            </select>
          </div>
          <div>
            <div class="muted" style="font-weight:900; margin-bottom:8px;">Auto finalize (recommended)</div>
            <div class="muted">This picks an action inconsistent with AI verdict to show penalties clearly.</div>
          </div>
        </div>

        <div style="height:14px;"></div>
        <div class="row">
          <button class="btn primary" id="autoBtn" type="button">Auto finalize</button>
          <button class="btn" id="approveBtn" type="button">Approve (manual)</button>
          <button class="btn" id="disputeBtn" type="button">Dispute (manual)</button>
          <a class="btn" href="/upwork/results" id="resultsLink" style="display:none;">View Results</a>
        </div>
        <div style="height:12px;"></div>
        <div class="log" id="log">Ready.</div>
      </div>
    </main>

    <script>
      const $ = (id) => document.getElementById(id);
      const jobId = localStorage.getItem("upwork_job_id");
      $("jobId").textContent = jobId ? jobId : "(missing)";
      const setLog = (m) => $("log").textContent = m;

      async function getStatus() {
        const r = await fetch(`/upwork/job/status?job_id=${encodeURIComponent(jobId)}`);
        const out = await r.json();
        return out.job;
      }

      async function finalize(action) {
        const client_index = parseInt($("clientIndex").value, 10);
        setLog(`Finalizing action=${action}...`);
        const url = action === "APPROVE" ? "/upwork/job/approve" : "/upwork/job/dispute";
        const res = await fetch(url, {
          method:"POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({job_id: parseInt(jobId,10), client_index})
        });
        const out = await res.json();
        if (!res.ok || !out.ok) throw new Error(out.message || "finalize failed");
        setLog("Decision committed. Redirecting to results...");
        window.location.href = "/upwork/results";
      }

      $("approveBtn").addEventListener("click", async () => {
        try { await finalize("APPROVE"); } catch (e) { setLog("Error: " + e); }
      });

      $("disputeBtn").addEventListener("click", async () => {
        try { await finalize("DISPUTE"); } catch (e) { setLog("Error: " + e); }
      });

      $("autoBtn").addEventListener("click", async () => {
        try {
          const job = await getStatus();
          const verdict = job && job.ai_result ? job.ai_result.verdict : null;
          if (!verdict) throw new Error("AI verdict missing. Run AI first.");
          // If AI says LEGIT, choose DISPUTE (inconsistent) to penalize client.
          // If AI says FRAUD, choose APPROVE (inconsistent) to penalize client.
          const action = verdict === "LEGIT" ? "DISPUTE" : "APPROVE";
          setLog(`AI verdict=${verdict}. Auto choosing action=${action}.`);
          await finalize(action);
        } catch (e) {
          setLog("Error: " + e);
          console.error(e);
        }
      });
    </script>
  </body>
</html>
